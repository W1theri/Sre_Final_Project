apiVersion: v1
kind: Service
metadata:
  name: ecommerce-service
  namespace: ecommerce
  labels:
    app: ecommerce
spec:
  selector:
    app: ecommerce
  ports:
    - name: http
      port:       80
      targetPort: 5000
      protocol:   TCP
  type: ClusterIP
---
# NodePort for local Minikube access
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-nodeport
  namespace: ecommerce
spec:
  selector:
    app: ecommerce
  ports:
    - port:       80
      targetPort: 5000
      nodePort:   30080
  type: NodePort
