apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ecommerce-hpa
  namespace: ecommerce
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       ecommerce-app

  minReplicas: 2
  maxReplicas: 10

  metrics:
    # Scale on CPU utilization
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60   # Scale up when > 60% CPU

    # Scale on memory utilization
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30     # React quickly to traffic spikes
      policies:
        - type:          Pods
          value:         3
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300    # Wait 5 min before scaling down
      policies:
        - type:          Pods
          value:         1
          periodSeconds: 120
