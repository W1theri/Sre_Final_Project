global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: 'production'
    project:     'ecommerce-sre'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - "alerts.yml"

# Scrape configurations
scrape_configs:

  # E-Commerce Application
  - job_name: 'ecommerce-app'
    static_configs:
      - targets:
          - 'ecommerce-app-0:5000'
          - 'ecommerce-app-1:5000'
    metrics_path: '/metrics'
    scrape_interval: 10s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter (system metrics)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s
